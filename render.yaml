services:
  - type: web
    name: skill-extractor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
        generateValue: true
